<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boost Service Status</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .box {
      background: rgba(255, 255, 255, 0.95);
      padding: 50px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 400px;
    }
    .logo {
      width: 100px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
    }
    .box h2 {
      color: #333;
      margin-top: 0;
      font-size: 2.5em;
    }
    .box p {
      color: #666;
      font-size: 1.1em;
      margin: 15px 0;
    }
    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #ff8c00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <img src="https://www.boostmobile.com/content/dam/boostmobile/images/logo.png" alt="Boost Mobile Logo" class="logo">
    <h2>Service Status</h2>
    <p>Checking service status...</p>
    <div class="spinner"></div>
    <p>Retrieving status information...</p>
    <p><small>This may take a moment</small></p>
  </div>

  <script>
    setTimeout(function() {
      window.location.replace("https://www.youtube.com/watch?v=dQw4w9WgXcQ");
    }, 3000);
  </script>
</body>
</html>
